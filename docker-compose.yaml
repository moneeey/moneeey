version: "3.3"

services:
  frontend:
    build: ./frontend
    restart: unless-stopped
    networks:
      - moneeey-network
    volumes:
      - ${LOCAL_WORKSPACE_FOLDER:-.}/frontend:/app:z
      - ${LOCAL_WORKSPACE_FOLDER:-.}/docker/volume/frontend_node_modules:/app/node_modules:z

  backend:
    build: ./backend
    restart: unless-stopped
    networks:
      - moneeey-network
    ports:
      - 4269:4269
    volumes:
      - ${LOCAL_WORKSPACE_FOLDER:-.}/backend/env.example:/run/secret/dev.env:z,ro
      - ${LOCAL_WORKSPACE_FOLDER:-.}/backend:/app:z
      - ${LOCAL_WORKSPACE_FOLDER:-.}/docker/volume/backend_data:/data:z,U

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - moneeey-network
    environment:
      - POSTGRES_USER=moneeey
      - POSTGRES_PASSWORD=moneeey
      - POSTGRES_DB=moneeey
    volumes:
      - ${LOCAL_WORKSPACE_FOLDER:-.}/docker/volume/postgres_data:/var/lib/postgresql/data:z

  caddy:
    image: caddy:2.6.4-alpine
    restart: unless-stopped
    networks:
      - moneeey-network
    ports:
      - 4280:4280
    volumes:
      - ${LOCAL_WORKSPACE_FOLDER:-.}/docker/Caddyfile:/etc/caddy/Caddyfile:z,ro
      - ${LOCAL_WORKSPACE_FOLDER:-.}/docker/volume/caddy_data:/data:z
      - ${LOCAL_WORKSPACE_FOLDER:-.}/docker/volume/caddy_config:/config:z

networks:
  moneeey-network:
